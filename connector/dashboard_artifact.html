<!--
  Family Finance — Cowork LIVE dashboard artifact.

  This is meant to be published as a Cowork live artifact (mcp__cowork__create_artifact)
  with mcp_tools = the Family Finance connector tools. It reads live data each time it
  opens via window.cowork.callMcpTool(...). If the connector isn't connected yet it shows
  a friendly "connect the connector" state instead of breaking.

  Tools used: net_worth, monthly_summary, list_accounts, list_investments,
              upcoming_premiums, settle_up, recent_expenses
-->
<div id="app">
  <div id="banner" class="banner hidden"></div>

  <div class="cards">
    <div class="card"><div class="label">Net worth</div><div class="value big" id="networth">—</div></div>
    <div class="card"><div class="label">Cash in accounts</div><div class="value" id="cash">—</div></div>
    <div class="card"><div class="label">Investments</div><div class="value" id="investVal">—</div></div>
    <div class="card"><div class="label">Income (this month)</div><div class="value pos" id="incMtd">—</div></div>
    <div class="card"><div class="label">Expenses (this month)</div><div class="value neg" id="expMtd">—</div></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>Spending by category (this month)</h2><canvas id="catChart" height="220"></canvas></div>
    <div class="card"><h2>🏦 Accounts</h2><div id="accounts"></div></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>📈 Investments</h2><div id="investments"></div></div>
    <div class="card"><h2>🛡️ Insurance & premiums</h2><div id="insurance"></div></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>💰 Settle up</h2><div id="settle" class="settle"></div></div>
    <div class="card"><h2>Recent expenses</h2><div id="recent"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<style>
  :root { --card:#1f2c34; --accent:#25d366; --text:#e9edef; --muted:#8696a0;
          --pos:#25d366; --neg:#f15c6d; --warn:#f0b232; }
  #app { color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; }
  .card { background:var(--card); border-radius:12px; padding:16px; }
  .label { color:var(--muted); font-size:13px; }
  .value { font-size:22px; font-weight:700; margin-top:6px; }
  .value.big { font-size:28px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
  @media (max-width:760px){ .grid2 { grid-template-columns:1fr; } }
  h2 { font-size:14px; color:var(--muted); margin:0 0 10px; font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:8px 6px; border-bottom:1px solid #2a3942; }
  th { color:var(--muted); font-weight:600; }
  td.amt { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { background:#2a3942; border-radius:20px; padding:2px 9px; font-size:12px; }
  .settle { font-size:14px; line-height:1.9; }
  .empty { color:var(--muted); padding:14px; text-align:center; }
  .pos { color:var(--pos);} .neg { color:var(--neg);} .warn { color:var(--warn);}
  .banner { background:#3a2a12; border:1px solid var(--warn); color:#f0d8a8;
            padding:12px 14px; border-radius:10px; margin-bottom:14px; font-size:14px; }
  .hidden { display:none; }
</style>
<script>
let currency = "", catChart;
const $ = id => document.getElementById(id);

// Call a connector tool and unwrap the result (Cowork wraps MCP responses).
async function tool(name, args = {}) {
  if (!window.cowork || !window.cowork.callMcpTool) throw new Error("no-cowork");
  const r = await window.cowork.callMcpTool(name, args);
  if (r.isError) throw new Error(r.content?.[0]?.text || name + " failed");
  return r.structuredContent ?? JSON.parse(r.content[0].text);
}

function money(n){ return `${currency} ${Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
function signed(n){ const c=n>=0?"pos":"neg", s=n>=0?"▲":"▼"; return `<span class="${c}">${s} ${money(Math.abs(n))}</span>`; }
function showBanner(msg){ const b=$("banner"); b.textContent=msg; b.classList.remove("hidden"); }

async function load() {
  try {
    const [nw, ms, accts, invs, ins, settle, recent] = await Promise.all([
      tool("net_worth"), tool("monthly_summary"), tool("list_accounts"),
      tool("list_investments"), tool("upcoming_premiums"), tool("settle_up"),
      tool("recent_expenses", { limit: 20 }),
    ]);
    currency = ms.currency || "";
    $("banner").classList.add("hidden");

    $("networth").textContent = money(nw.net_worth);
    $("cash").textContent = money(nw.cash_in_accounts);
    $("investVal").textContent = money(nw.investments_value);
    $("incMtd").textContent = money(ms.income);
    $("expMtd").textContent = money(ms.expenses);

    const cats = ms.by_category || [];
    if (catChart) catChart.destroy();
    catChart = new Chart($("catChart"), { type:"bar",
      data:{ labels:cats.map(c=>c.category), datasets:[{ data:cats.map(c=>c.amount),
             backgroundColor:"#25d366", borderRadius:6 }] },
      options:{ plugins:{legend:{display:false}},
        scales:{ x:{ticks:{color:"#8696a0"},grid:{display:false}}, y:{ticks:{color:"#8696a0"},grid:{color:"#2a3942"}} } } });

    $("accounts").innerHTML = (accts.accounts||[]).length ? "<table>"+
      "<tr><th>Account</th><th>Owner</th><th class='amt'>Balance</th></tr>"+
      accts.accounts.map(a=>`<tr><td>${a.bank_name} ****${a.last4} ${a.kind==='credit_card'?'💳':''}</td>
        <td>${a.owner||'—'}</td><td class="amt">${money(a.balance)}</td></tr>`).join("")+"</table>"
      : '<div class="empty">No accounts yet.</div>';

    $("investments").innerHTML = (invs.investments||[]).length ? "<table>"+
      "<tr><th>Holding</th><th class='amt'>Value</th><th class='amt'>Gain</th></tr>"+
      invs.investments.map(i=>`<tr><td>${i.name} <span class="pill">${i.kind}</span></td>
        <td class="amt">${money(i.current_value)}</td><td class="amt">${signed(i.gain)}</td></tr>`).join("")+"</table>"
      : '<div class="empty">No investments yet.</div>';

    $("insurance").innerHTML = (ins.insurance||[]).length ? "<table>"+
      "<tr><th>Policy</th><th class='amt'>Premium</th><th>Due</th></tr>"+
      ins.insurance.map(p=>{ let due="—"; if(p.due_date){ const d=p.days_until_due;
          const cls=d<0?"neg":(d<=30?"warn":""); const lbl=d<0?"overdue":`in ${d}d`;
          due=`<span class="${cls}">${p.due_date} (${lbl})</span>`; }
        return `<tr><td>${p.name} <span class="pill">${p.kind}</span></td>
          <td class="amt">${money(p.premium)}/${p.frequency}</td><td>${due}</td></tr>`; }).join("")+"</table>"
      : '<div class="empty">No policies yet.</div>';

    $("settle").innerHTML = (settle.settlements||[]).length
      ? settle.settlements.map(x=>`<div>• <b>${x.debtor}</b> → <b>${x.creditor}</b>: ${money(x.amount)}</div>`).join("")
      : '<div class="empty">Everyone is settled up 🎉</div>';

    $("recent").innerHTML = (recent.expenses||[]).length ? "<table>"+
      "<tr><th>Date</th><th>Category</th><th>Note</th><th class='amt'>Amount</th></tr>"+
      recent.expenses.map(r=>`<tr><td>${r.spent_at}</td><td><span class="pill">${r.category}</span></td>
        <td>${r.note||""}</td><td class="amt">${money(r.amount)}</td></tr>`).join("")+"</table>"
      : '<div class="empty">No expenses yet.</div>';
  } catch (e) {
    if (String(e.message).includes("no-cowork")) {
      showBanner("Open this inside Claude Cowork to see live data.");
    } else {
      showBanner("⚠️ Couldn't reach the Family Finance connector. Make sure it's connected, then press Reload.");
    }
    console.error(e);
  }
}
load();
</script>
