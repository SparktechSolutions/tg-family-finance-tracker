name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might it work? A command, a dashboard screen, a setting…
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Telegram bot / commands
        - Web dashboard
        - Reports / analytics
        - Accounts / budgets / loans
        - Setup / docs
        - Other
