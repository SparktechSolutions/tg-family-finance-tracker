<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Finance Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<style>
  :root { --bg:#0b141a; --card:#1f2c34; --accent:#25d366; --text:#e9edef; --muted:#8696a0;
          --pos:#25d366; --neg:#f15c6d; --warn:#f0b232; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--text); }
  header { background:var(--card); padding:16px 24px; display:flex; align-items:center;
           justify-content:space-between; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .right { display:flex; gap:12px; align-items:center; }
  select, button, a.btn { background:#2a3942; color:var(--text); border:1px solid #374248;
           border-radius:8px; padding:8px 12px; font-size:14px; cursor:pointer; text-decoration:none; }
  main { padding:24px; max-width:1100px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; }
  .card { background:var(--card); border-radius:12px; padding:18px; }
  .card .label { color:var(--muted); font-size:13px; }
  .card .value { font-size:24px; font-weight:700; margin-top:6px; }
  .value.big { font-size:30px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
  @media (max-width:760px){ .grid2 { grid-template-columns:1fr; } }
  h2 { font-size:15px; color:var(--muted); margin:0 0 12px; font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:9px 8px; border-bottom:1px solid #2a3942; }
  th { color:var(--muted); font-weight:600; }
  td.amt { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { background:#2a3942; border-radius:20px; padding:3px 10px; font-size:12px; }
  .settle { font-size:14px; line-height:1.9; }
  .empty { color:var(--muted); padding:18px; text-align:center; }
  .pos { color:var(--pos); } .neg { color:var(--neg); } .warn { color:var(--warn); }
</style>
</head>
<body>
<header>
  <h1>👨‍👩‍👧‍👦 Family Finance Tracker</h1>
  <div class="right">
    <select id="groupSelect"></select>
    <a class="btn" id="csvLink" href="#">Export CSV</a>
    <button id="reloadBtn">Reload</button>
  </div>
</header>
<main>
  <div class="cards">
    <div class="card"><div class="label">Net worth</div><div class="value big" id="networth">—</div></div>
    <div class="card"><div class="label">Cash in accounts</div><div class="value" id="cash">—</div></div>
    <div class="card"><div class="label">Investments</div><div class="value" id="investVal">—</div></div>
    <div class="card"><div class="label">Income (this month)</div><div class="value pos" id="incMtd">—</div></div>
    <div class="card"><div class="label">Expenses (this month)</div><div class="value neg" id="expMtd">—</div></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>Spending by category</h2><canvas id="catChart" height="220"></canvas></div>
    <div class="card"><h2>Spending by person</h2><canvas id="memChart" height="220"></canvas></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>🏦 Accounts</h2><div id="accounts"></div></div>
    <div class="card"><h2>📈 Investments</h2><div id="investments"></div></div>
  </div>

  <div class="grid2">
    <div class="card"><h2>🛡️ Insurance & premiums</h2><div id="insurance"></div></div>
    <div class="card"><h2>💰 Settle up</h2><div id="settle" class="settle"></div></div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Recent expenses</h2><div id="expensesWrap"><table id="expenses"></table></div>
  </div>
</main>

<script>
let currency = "", catChart, memChart;
const $ = id => document.getElementById(id);
async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(url); return r.json(); }
function money(n){ return `${currency} ${Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
function signed(n){ const c = n>=0?"pos":"neg"; const s=n>=0?"▲":"▼"; return `<span class="${c}">${s} ${money(Math.abs(n))}</span>`; }

async function loadGroups(){
  const groups = await j("/api/groups");
  const sel = $("groupSelect"); sel.innerHTML = "";
  if(!groups.length){ sel.innerHTML = '<option>No groups yet</option>'; return null; }
  groups.forEach(g => { const o=document.createElement("option"); o.value=g.id; o.textContent=g.name||g.wa_group_id; sel.appendChild(o); });
  return Number(sel.value);
}

function drawBar(id, existing, labels, data){
  const ctx = $(id); if(existing) existing.destroy();
  return new Chart(ctx, { type:"bar",
    data:{ labels, datasets:[{ data, backgroundColor:"#25d366", borderRadius:6 }] },
    options:{ plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:"#8696a0"},grid:{display:false}}, y:{ticks:{color:"#8696a0"},grid:{color:"#2a3942"}} } } });
}

async function loadDashboard(gid){
  $("csvLink").href = `/api/expenses.csv?group_id=${gid}`;
  const s = await j(`/api/summary?group_id=${gid}`);
  currency = s.group.currency || "";

  $("networth").textContent = money(s.net_worth.net_worth);
  $("cash").textContent = money(s.net_worth.cash_in_accounts);
  $("investVal").textContent = money(s.net_worth.investments_value);
  $("incMtd").textContent = money(s.income_this_month);
  $("expMtd").textContent = money(s.total_this_month);

  catChart = drawBar("catChart", catChart, s.by_category.map(x=>x.category), s.by_category.map(x=>x.amount));
  memChart = drawBar("memChart", memChart, s.by_member.map(x=>x.member), s.by_member.map(x=>x.amount));

  // Accounts
  $("accounts").innerHTML = s.accounts.length ? "<table>" +
    "<tr><th>Account</th><th>Owner</th><th class='amt'>Balance</th></tr>" +
    s.accounts.map(a=>`<tr><td>${a.bank_name} ****${a.last4} ${a.kind==='credit_card'?'💳':''}</td>
      <td>${a.owner||'—'}</td><td class="amt">${money(a.balance)}</td></tr>`).join("") + "</table>"
    : '<div class="empty">No accounts yet. Family members send /start.</div>';

  // Investments
  $("investments").innerHTML = s.investments.length ? "<table>" +
    "<tr><th>Holding</th><th>Owner</th><th class='amt'>Value</th><th class='amt'>Gain</th></tr>" +
    s.investments.map(i=>`<tr><td>${i.name} <span class="pill">${i.kind}</span></td>
      <td>${i.owner||'—'}</td><td class="amt">${money(i.current_value)}</td>
      <td class="amt">${signed(i.gain)}</td></tr>`).join("") + "</table>"
    : '<div class="empty">No investments yet. /invest add …</div>';

  // Insurance
  $("insurance").innerHTML = s.insurance.length ? "<table>" +
    "<tr><th>Policy</th><th>Owner</th><th class='amt'>Premium</th><th>Due</th></tr>" +
    s.insurance.map(p=>{
      let due="—"; if(p.due_date){ const d=p.days_until_due;
        const cls = d<0?"neg":(d<=30?"warn":""); const lbl = d<0?"overdue":`in ${d}d`;
        due = `<span class="${cls}">${p.due_date} (${lbl})</span>`; }
      return `<tr><td>${p.name} <span class="pill">${p.kind}</span></td><td>${p.owner||'—'}</td>
        <td class="amt">${money(p.premium)}/${p.frequency}</td><td>${due}</td></tr>`;
    }).join("") + "</table>"
    : '<div class="empty">No policies yet. /insurance add …</div>';

  // Settle up
  $("settle").innerHTML = s.settlements.length
    ? s.settlements.map(x=>`<div>• <b>${x.debtor}</b> → <b>${x.creditor}</b>: ${money(x.amount)}</div>`).join("")
    : '<div class="empty">Everyone is settled up 🎉</div>';

  // Recent expenses
  const rows = await j(`/api/expenses?group_id=${gid}&limit=50`);
  if(!rows.length){ $("expensesWrap").innerHTML = '<div class="empty">No expenses yet. Send one in the group!</div>'; return; }
  $("expenses").innerHTML = "<tr><th>Date</th><th>Category</th><th>Note</th><th>Payer</th><th class='amt'>Amount</th></tr>" +
    rows.map(r=>`<tr><td>${r.spent_at}</td><td><span class="pill">${r.category}</span></td>
      <td>${r.note||""}</td><td>${r.payer||"—"}</td><td class="amt">${money(r.amount)}</td></tr>`).join("");
}

async function refresh(){
  try { const sel=$("groupSelect"); const gid = sel.value ? Number(sel.value) : await loadGroups();
    if(gid==null) return; await loadDashboard(gid); } catch(e){ console.error(e); }
}
$("groupSelect").addEventListener("change", refresh);
$("reloadBtn").addEventListener("click", refresh);
(async ()=>{ await loadGroups(); refresh(); })();
</script>
</body>
</html>
